# CloudNativePG — PostgreSQL high-availability cluster
# Requires CNPG Operator installed in the cluster.
# Install: kubectl apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.1.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  # PostgreSQL superuser / app database credentials
  superuserSecret:
    name: postgres-superuser
  bootstrap:
    initdb:
      database: heliotrope
      owner: postgres_example_user
      secret:
        name: postgres-app-user

  storage:
    storageClass: ""
    size: 20Gi

  # Automated Backup (Requires S3-compatible storage — comment out if not used)
  # backup:
  #   barmanObjectStore:
  #     destinationPath: s3://bouquet-postgres-backups/
  #     endpointURL: https://s3.example.com
  #     s3Credentials:
  #       accessKeyId:
  #         name: postgres-backup-creds
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: postgres-backup-creds
  #         key: SECRET_ACCESS_KEY
  #   retentionPolicy: "30d"

  # Prometheus Monitoring (comment out if not used)
  # monitoring:
  #   enablePodMonitor: true
---
# RW service generated by CNPG (primary)
# The application connects via postgres-pooler-rw:5432 (via Pooler)
# The DB URL in secret.example.yaml also points to postgres-pooler-rw
---
# PgBouncer Connection Pool — The application connects to PostgreSQL through this service
# Bypasses direct connection to postgres-rw and goes through Pooler to prevent connection exhaustion
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: postgres-pooler
spec:
  cluster:
    name: postgres

  # Handle read-write traffic only (primary)
  type: rw

  # PgBouncer pool settings
  instances: 2
  template:
    metadata:
      labels:
        app: postgres-pooler
    spec:
      containers:
        - name: pgbouncer

  # PgBouncer parameters
  pgbouncer:
    poolMode: transaction
    maxClientConn: "100"
    defaultPoolSize: "10"
    minPoolSize: "2"
    reservePoolSize: "5"
    reservePoolTimeout: "3"
    queryWaitTimeout: "120"

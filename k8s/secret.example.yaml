apiVersion: v1
kind: Secret
metadata:
  name: bouquet-secrets
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "mongo_example_user"
  MONGO_INITDB_ROOT_PASSWORD: "mongo_example_passwd"

  # Required when using StatefulSet mode (postgres-statefulset.yaml)
  POSTGRES_USER: "postgres_example_user"
  POSTGRES_PASSWORD: "postgres_example_passwd"
  POSTGRES_DB: "heliotrope"

  HELIOTROPE_GALLERYINFO_DB_URL: "postgresql+asyncpg://postgres_example_user:postgres_example_passwd@postgres-pooler-rw:5432/heliotrope"
  HELIOTROPE_INFO_DB_URL: "mongodb://mongo_example_user:mongo_example_passwd@mongodb:27017"

  SUNFLOWER_GALLERYINFO_DB_URL: "postgresql+asyncpg://postgres_example_user:postgres_example_passwd@postgres-pooler-rw:5432/heliotrope"
  SUNFLOWER_INFO_DB_URL: "mongodb://mongo_example_user:mongo_example_passwd@mongodb:27017"
---
# CNPG superuser secret (postgres admin account)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser
type: Opaque
stringData:
  username: "postgres"
  password: "postgres_example_passwd"
---
# CNPG app user secret (heliotrope database owner)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app-user
type: Opaque
stringData:
  username: "postgres_example_user"
  password: "postgres_example_passwd"

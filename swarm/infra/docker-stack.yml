# Docker Swarm Stack — Infrastructure/Management Services (Manager Node Only)
# traefik + arcane
#
# Deployment:
#   docker stack deploy -c docker-stack.yml bouquet-infra

services:

  # ── Traefik (Reverse Proxy + TLS) ──────────────────────────
  traefik:
    image: traefik:latest
    ports:
      - target: 80
        published: 80
        mode: ingress
      - target: 443
        published: 443
        mode: ingress
    environment:
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Swarm mode (Traefik v3)
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=bouquet-net
      # Cloudflare DNS Challenge
      - --certificatesresolvers.cfresolver.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cfresolver.acme.email=${CLOUDFLARE_EMAIL}
      - --certificatesresolvers.cfresolver.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.cfresolver.acme.dnschallenge.delaybeforecheck=0
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
    networks:
      - bouquet-net

  # ── Arcane (Swarm Management UI) ─────────────────────────────
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    expose:
      - "3552"
    environment:
      APP_URL: https://arcane.${DOMAIN}
      ENCRYPTION_KEY: ${ARCANE_ENCRYPTION_KEY}
      JWT_SECRET: ${ARCANE_JWT_SECRET}
      PUID: "1000"
      PGID: "1000"
      TZ: Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - arcane_data:/app/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
      labels:
        - "traefik.enable=true"

        # HTTPS router
        - "traefik.http.routers.arcane.rule=Host(`arcane.${DOMAIN}`)"
        - "traefik.http.routers.arcane.entrypoints=websecure"
        - "traefik.http.routers.arcane.tls.certresolver=cfresolver"
        - "traefik.http.services.arcane.loadbalancer.server.port=3552"

        # HTTP → HTTPS
        - "traefik.http.routers.arcane-http.rule=Host(`arcane.${DOMAIN}`)"
        - "traefik.http.routers.arcane-http.entrypoints=web"
        - "traefik.http.routers.arcane-http.middlewares=https-redirect"

        # Middlewares
        - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
    networks:
      - bouquet-net

networks:
  bouquet-net:
    name: bouquet-net
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  traefik_letsencrypt:
  arcane_data:

# Docker Swarm Stack — Application Services (Worker Node Only)
# postgres + sunflower + heliotrope + hibiscus
#
# Deployment:
#   docker stack deploy -c docker-stack.yml bouquet-apps

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:latest
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
    networks:
      - bouquet-net

  # ── Hibiscus (Frontend) ──────────────────────────────────────
  hibiscus:
    image: ghcr.io/saebasol/hibiscus:latest
    expose:
      - "3000"
    environment:
      HELIOTROPE_BASE_URL: "http://heliotrope:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
      labels:
        - "traefik.enable=true"

        # HTTPS router
        - "traefik.http.routers.hibiscus.rule=Host(`hibiscus.${DOMAIN}`)"
        - "traefik.http.routers.hibiscus.entrypoints=websecure"
        - "traefik.http.routers.hibiscus.tls.certresolver=cfresolver"
        - "traefik.http.services.hibiscus.loadbalancer.server.port=3000"

        # HTTP → HTTPS
        - "traefik.http.routers.hibiscus-http.rule=Host(`hibiscus.${DOMAIN}`)"
        - "traefik.http.routers.hibiscus-http.entrypoints=web"
        - "traefik.http.routers.hibiscus-http.middlewares=https-redirect"
    networks:
      - bouquet-net

  # ── Sunflower ────────────────────────────────────────────────
  # Serves / and /api/status paths of heliotrope.saebasol.org
  sunflower:
    image: ghcr.io/saebasol/sunflower:latest
    expose:
      - "22222"
    environment:
      SUNFLOWER_USE_ENV: "true"
      SUNFLOWER_PRODUCTION: "true"
      SUNFLOWER_HOST: "0.0.0.0"
      SUNFLOWER_SENTRY_DSN: ${SUNFLOWER_SENTRY_DSN}
      SUNFLOWER_GALLERYINFO_DB_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      SUNFLOWER_INFO_DB_URL: ${MONGODB_ATLAS_URL}
      SUNFLOWER_INDEX_FILES: '["index-korean.nozomi"]'
      SANIC_WORKER_ACK_TIMEOUT: "60"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://127.0.0.1:22222/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
      labels:
        - "traefik.enable=true"

        # HTTPS router — / and /api/status (sunflower, high priority)
        - "traefik.http.routers.sunflower.rule=Host(`heliotrope.${DOMAIN}`) && (Path(`/`) || Path(`/api/status`))"
        - "traefik.http.routers.sunflower.entrypoints=websecure"
        - "traefik.http.routers.sunflower.tls.certresolver=cfresolver"
        - "traefik.http.routers.sunflower.priority=10"
        - "traefik.http.services.sunflower.loadbalancer.server.port=22222"

        # HTTP → HTTPS
        - "traefik.http.routers.sunflower-http.rule=Host(`heliotrope.${DOMAIN}`) && (Path(`/`) || Path(`/api/status`))"
        - "traefik.http.routers.sunflower-http.entrypoints=web"
        - "traefik.http.routers.sunflower-http.middlewares=https-redirect"
        - "traefik.http.routers.sunflower-http.priority=10"

        # Middlewares
        - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
    networks:
      - bouquet-net

  # ── Heliotrope ───────────────────────────────────────────────
  # Serves the rest of the paths of heliotrope.saebasol.org
  heliotrope:
    image: ghcr.io/saebasol/heliotrope:latest
    expose:
      - "8000"
    environment:
      HELIOTROPE_USE_ENV: "true"
      HELIOTROPE_PRODUCTION: "true"
      HELIOTROPE_HOST: "0.0.0.0"
      HELIOTROPE_SENTRY_DSN: ${HELIOTROPE_SENTRY_DSN}
      HELIOTROPE_GALLERYINFO_DB_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      HELIOTROPE_INFO_DB_URL: ${MONGODB_ATLAS_URL}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 0
        order: stop-first
      labels:
        - "traefik.enable=true"

        # HTTPS router — catch-all (low priority)
        - "traefik.http.routers.heliotrope.rule=Host(`heliotrope.${DOMAIN}`) && PathPrefix(`/`)"
        - "traefik.http.routers.heliotrope.entrypoints=websecure"
        - "traefik.http.routers.heliotrope.tls.certresolver=cfresolver"
        - "traefik.http.routers.heliotrope.priority=1"
        - "traefik.http.services.heliotrope.loadbalancer.server.port=8000"

        # HTTP → HTTPS
        - "traefik.http.routers.heliotrope-http.rule=Host(`heliotrope.${DOMAIN}`) && PathPrefix(`/`)"
        - "traefik.http.routers.heliotrope-http.entrypoints=web"
        - "traefik.http.routers.heliotrope-http.middlewares=https-redirect"
        - "traefik.http.routers.heliotrope-http.priority=1"
    networks:
      - bouquet-net

networks:
  bouquet-net:
    external: true
    name: bouquet-net

volumes:
  pgdata:
